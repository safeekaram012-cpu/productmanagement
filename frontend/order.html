<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Order - Product Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .order-container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header-section h1 {
            color: #333;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
        }
        
        .back-btn {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #667eea;
            color: #667eea;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            text-decoration: none;
            display: inline-block;
        }
        
        .back-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }
        
        .product-summary {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }
        
        .product-image {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        
        .price-breakdown {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .price-row:last-child {
            border-bottom: none;
            font-weight: 700;
            font-size: 1.2rem;
            color: #28a745;
        }
        
        .form-label {
            font-weight: 600;
            color: #555;
        }
        
        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .payment-options {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        
        .payment-option {
            flex: 1;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .payment-option:hover {
            border-color: #667eea;
            background: #f8f9fa;
        }
        
        .payment-option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        
        .btn-place-order {
            background: linear-gradient(45deg, #28a745, #20c997);
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .btn-place-order:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(40, 167, 69, 0.4);
        }
        
        .btn-place-order:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .otp-section {
            display: none;
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .otp-input {
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 10px;
            font-weight: 700;
        }
        
        .alert {
            border-radius: 10px;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .payment-options {
                flex-direction: column;
            }
            
            .header-section h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="order-container">
        <!-- Header Section -->
        <div class="header-section">
            <a href="products.html" class="back-btn">
                <i class="fas fa-arrow-left me-2"></i>Back to Products
            </a>
            <h1><i class="fas fa-shopping-cart me-3"></i>Place Order</h1>
            <p class="text-muted">Complete your order details and confirm purchase</p>
        </div>
        
        <!-- Product Summary -->
        <div class="product-summary">
            <h4><i class="fas fa-box me-2"></i>Product Details</h4>
            <div class="row">
                <div class="col-md-3">
                    <img id="productImage" src="" alt="Product" class="product-image">
                </div>
                <div class="col-md-9">
                    <h5 id="productName">Loading...</h5>
                    <p class="text-muted mb-2">Category: <span id="productCategory">Loading...</span></p>
                    <div class="price-breakdown">
                        <div class="price-row">
                            <span>Product Price:</span>
                            <span>₹<span id="productPrice">0.00</span></span>
                        </div>
                        <div class="price-row">
                            <span>GST (18%):</span>
                            <span>₹<span id="gstAmount">0.00</span></span>
                        </div>
                        <div class="price-row">
                            <span>Delivery Charge:</span>
                            <span>₹40.00</span>
                        </div>
                        <div class="price-row">
                            <span>Total Amount:</span>
                            <span>₹<span id="totalAmount">0.00</span></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Customer Details Form -->
        <div class="customer-form">
            <h4><i class="fas fa-shopping-cart me-2"></i>Place Order</h4>
            <form id="orderForm">
                <!-- Backend API Required Fields Only -->
                <div class="row">
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="userId" class="form-label">User ID *</label>
                            <input type="number" class="form-control" id="userId" required placeholder="Enter user ID" min="1" value="1">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="productId" class="form-label">Product ID *</label>
                            <input type="number" class="form-control" id="productId" required placeholder="Enter product ID" min="1">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label for="qty" class="form-label">Quantity *</label>
                            <input type="number" class="form-control" id="qty" required placeholder="Enter quantity" min="1" value="1">
                        </div>
                    </div>
                </div>
                
                <!-- Place Order Button -->
                <div class="mt-4">
                    <button type="submit" class="btn-place-order" id="placeOrderBtn">
                        <i class="fas fa-check-circle me-2"></i>Place Order
                    </button>
                </div>
            </form>
        </div>
        
        <!-- Alert Container -->
        <div id="alertContainer" class="alert-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let selectedProduct = null;
        let selectedPayment = null;
        let generatedOTP = null;
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            loadProductDetails();
            
            document.getElementById('orderForm').addEventListener('submit', handleOrderSubmit);
            document.getElementById('mobileNumber').addEventListener('input', validateMobileNumber);
            
            // Add quantity change listener for dynamic price calculation
            const qtyInput = document.getElementById('qty');
            if (qtyInput) {
                qtyInput.addEventListener('input', updateTotalPrice);
                console.log('Event listener added to qty input');
                
                // Test the function immediately
                setTimeout(() => {
                    console.log('Testing updateTotalPrice function...');
                    updateTotalPrice();
                }, 1000);
            } else {
                console.log('qty input not found');
            }
        });
        
        function loadProductDetails() {
            // Get product from sessionStorage
            const productData = sessionStorage.getItem('selectedProduct');
            if (productData) {
                selectedProduct = JSON.parse(productData);
                displayProductDetails();
                updateTotalPrice(); // Use dynamic calculation instead of calculateTotal
                
                // Auto-populate productId field
                const productIdInput = document.getElementById('productId');
                if (productIdInput && selectedProduct.id) {
                    productIdInput.value = selectedProduct.id;
                }
            } else {
                showAlert('No product selected. Please select a product first.', 'error');
                setTimeout(() => {
                    window.location.href = 'products.html';
                }, 2000);
            }
        }
        
        function displayProductDetails() {
            if (!selectedProduct) return;
            
            // Display product image
            const productImage = document.getElementById('productImage');
            if (selectedProduct.image1) {
                if (selectedProduct.image1.startsWith('data:')) {
                    productImage.src = selectedProduct.image1;
                } else {
                    productImage.src = `http://localhost:8080/uploads/${selectedProduct.image1}`;
                }
            }
            
            // Display product details
            document.getElementById('productName').textContent = selectedProduct.name || 'Unknown Product';
            document.getElementById('productCategory').textContent = selectedProduct.category || 'Uncategorized';
            document.getElementById('productPrice').textContent = (selectedProduct.price || 0).toFixed(2);
        }
        
        function updateTotalPrice() {
            console.log('updateTotalPrice called');
            console.log('selectedProduct:', selectedProduct);
            
            if (!selectedProduct) {
                console.log('No selectedProduct found');
                return;
            }
            
            const qty = parseInt(document.getElementById('qty').value) || 1;
            const price = parseFloat(selectedProduct.price) || 0;
            
            console.log('qty:', qty, 'price:', price);
            
            const gstRate = 0.18; // 18% GST
            const deliveryCharge = 40;
            
            const subtotal = price * qty;
            const gstAmount = subtotal * gstRate;
            const totalAmount = subtotal + gstAmount + deliveryCharge;
            
            console.log('totalAmount:', totalAmount);
            
            document.getElementById('gstAmount').textContent = gstAmount.toFixed(2);
            document.getElementById('totalAmount').textContent = totalAmount.toFixed(2);
        }
        
        function calculateTotal() {
            if (!selectedProduct) return;
            
            const price = parseFloat(selectedProduct.price) || 0;
            const gstRate = 0.18; // 18% GST
            const deliveryCharge = 40;
            
            const gstAmount = price * gstRate;
            const totalAmount = price + gstAmount + deliveryCharge;
            
            document.getElementById('gstAmount').textContent = gstAmount.toFixed(2);
            document.getElementById('totalAmount').textContent = totalAmount.toFixed(2);
        }
        
        function selectPayment(method) {
            // Remove previous selection
            document.querySelectorAll('.payment-option').forEach(option => {
                option.classList.remove('selected');
            });
            
            // Add selection to clicked option
            const selectedOption = document.querySelector(`[data-payment="${method}"]`);
            selectedOption.classList.add('selected');
            selectedPayment = method;
        }
        
        function validateMobileNumber() {
            const mobileInput = document.getElementById('mobileNumber');
            const mobileNumber = mobileInput.value;
            
            // Basic validation for 10-digit Indian mobile numbers
            if (mobileNumber.length === 10 && /^[6-9]\d{9}$/.test(mobileNumber)) {
                // Valid mobile number
                mobileInput.classList.remove('is-invalid');
                return true;
            } else {
                // Invalid mobile number
                mobileInput.classList.add('is-invalid');
                return false;
            }
        }
        
        function handleOrderSubmit(e) {
            e.preventDefault();
            
            // Get backend API required fields from form inputs
            const userId = document.getElementById('userId').value.trim();
            const productId = document.getElementById('productId').value.trim();
            const qty = document.getElementById('qty').value.trim();
            
            // Validate required API fields
            if (!userId || !productId || !qty) {
                showAlert('Please fill in User ID, Product ID, and Quantity.', 'error');
                return;
            }
            
            // Call backend API to save order IMMEDIATELY
            saveOrderToBackend(userId, productId, qty);
        }
        
        function showOTPSection() {
            const otpSection = document.getElementById('otpSection');
            const placeOrderBtn = document.getElementById('placeOrderBtn');
            
            otpSection.style.display = 'block';
            placeOrderBtn.textContent = 'Verify OTP to Place Order';
            placeOrderBtn.disabled = true;
            
            // Generate and send OTP (simulated)
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            showAlert(`OTP sent to your mobile: ${generatedOTP}`, 'success');
        }
        
        function verifyOTP() {
            const otpInput = document.getElementById('otpInput').value.trim();
            
            if (otpInput === generatedOTP) {
                showAlert('OTP verified successfully!', 'success');
                confirmOrder();
            } else {
                showAlert('Invalid OTP. Please try again.', 'error');
            }
        }
        
        function resendOTP() {
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            showAlert(`New OTP sent: ${generatedOTP}`, 'success');
        }
        
        function confirmOrder() {
            if (!selectedProduct) return;
            
            const customerName = document.getElementById('customerName').value.trim();
            const mobileNumber = document.getElementById('mobileNumber').value.trim();
            const deliveryAddress = document.getElementById('deliveryAddress').value.trim();
            
            const price = parseFloat(selectedProduct.price) || 0;
            const gstAmount = price * 0.18;
            const deliveryCharge = 40;
            const totalAmount = price + gstAmount + deliveryCharge;
            
            // Create order details for WhatsApp
            const orderDetails = {
                product: selectedProduct.name,
                price: price.toFixed(2),
                gst: gstAmount.toFixed(2),
                delivery: deliveryCharge.toFixed(2),
                total: totalAmount.toFixed(2),
                customer: customerName,
                mobile: mobileNumber,
                address: deliveryAddress,
                payment: selectedPayment,
                timestamp: new Date().toLocaleString()
            };
            
            // Send WhatsApp message
            sendWhatsAppMessage(orderDetails);
            
            // Show success message
            showAlert('Order placed successfully! Check WhatsApp for confirmation.', 'success');
            
            // Clear form and redirect after delay
            setTimeout(() => {
                sessionStorage.removeItem('selectedProduct');
                window.location.href = 'products.html';
            }, 3000);
        }
        
        function saveOrderToBackend(userId, productId, qty) {
            console.log('Saving order with data:', { userId, productId, qty });
            
            // Validate parameters before sending
            if (!userId || !productId || !qty || qty <= 0) {
                showAlert('Please provide valid User ID, Product ID, and Quantity.', 'error');
                return;
            }
            
            // Use query parameters format as requested
            const url = `http://localhost:8080/api/orders/place?userId=${encodeURIComponent(userId)}&productId=${encodeURIComponent(productId)}&qty=${encodeURIComponent(qty)}`;
            
            console.log('Sending request to:', url);
            
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                }
            })
            .then(response => {
                console.log('Response status:', response.status);
                if (!response.ok) {
                    return response.text().then(text => {
                        throw new Error(`HTTP ${response.status}: ${text}`);
                    });
                }
                return response.json();
            })
            .then(data => {
                console.log('Order saved successfully:', data);
                showAlert('Order placed successfully!', 'success');
                
                // Clear form and redirect after delay
                setTimeout(() => {
                    sessionStorage.removeItem('selectedProduct');
                    window.location.href = 'products.html';
                }, 2000);
            })
            .catch(error => {
                console.error('Error saving order:', error);
                showAlert('Error saving order: ' + error.message, 'error');
            });
        }
        
        function sendWhatsAppMessage(orderDetails) {
            // Use customer's mobile number with India country code
            const phone = "91" + orderDetails.mobile;
            
            const message = `🛒 *NEW ORDER* 🛒\n\n` +
                `📦 *Product:* ${orderDetails.product}\n` +
                `💰 *Price:* ₹${orderDetails.price}\n` +
                `🧾 *GST:* ₹${orderDetails.gst}\n` +
                `🚚 *Delivery:* ₹${orderDetails.delivery}\n` +
                `💳 *Total:* ₹${orderDetails.total}\n\n` +
                `👤 *Customer:* ${orderDetails.customer}\n` +
                `📱 *Mobile:* ${orderDetails.mobile}\n` +
                `📍 *Address:* ${orderDetails.address}\n` +
                `💳 *Payment:* ${orderDetails.payment.toUpperCase()}\n` +
                `⏰ *Time:* ${orderDetails.timestamp}`;
            
            // Create WhatsApp URL and open in new tab
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
        }
        
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alertClass = type === 'success' ? 'alert-success' : 'alert-danger';
            
            const alert = document.createElement('div');
            alert.className = `alert ${alertClass} alert-dismissible fade show`;
            alert.style.cssText = 'margin-bottom: 10px; font-weight: bold;';
            alert.innerHTML = `
                <strong>${type === 'success' ? 'Success!' : 'Error!'}</strong> ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            // Clear previous alerts
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alert);
            
            // Auto-remove after 5 seconds
            setTimeout(() => {
                const alert = alertContainer.querySelector('.alert');
                if (alert) {
                    alert.remove();
                }
            }, 5000);
        }
    </script>
</body>
</html>
