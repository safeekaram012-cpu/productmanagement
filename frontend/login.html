<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Admin & Vendor Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            max-width: 450px;
            width: 100%;
            padding: 20px;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: #333;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #666;
            font-size: 1rem;
        }
        
        .form-floating {
            margin-bottom: 20px;
        }
        
        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            height: 50px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .btn-login {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .back-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        .alert {
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        
        .loading-spinner {
            display: none;
            text-align: center;
            margin-top: 10px;
        }
        
        .role-info {
            background: rgba(102, 126, 234, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .role-info h6 {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .role-info p {
            color: #666;
            font-size: 0.9rem;
            margin: 0;
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 10px;
            }
            
            .login-card {
                padding: 30px 20px;
            }
            
            .login-header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Login Header -->
            <div class="login-header">
                <i class="fas fa-lock fa-3x mb-3" style="color: #667eea;"></i>
                <h1><i class="fas fa-user-shield me-2"></i>Admin & Vendor Login</h1>
                <p>Access your product management dashboard</p>
            </div>
            
            <!-- Role Information -->
            <div class="role-info">
                <h6><i class="fas fa-info-circle me-1"></i>Access Information</h6>
                <p>Admins can manage all products. Vendors can manage their own products only.</p>
            </div>
            
            <!-- Error Alert -->
            <div id="errorAlert" class="alert alert-danger" role="alert">
                <i class="fas fa-exclamation-triangle me-2"></i>
                <span id="errorMessage">Invalid email or password</span>
            </div>
            
            <!-- Success Alert -->
            <div id="successAlert" class="alert alert-success" role="alert">
                <i class="fas fa-check-circle me-2"></i>
                <span id="successMessage">Login successful! Redirecting...</span>
            </div>
            
            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-floating">
                    <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                    <label for="email"><i class="fas fa-envelope me-2"></i>Email address</label>
                </div>
                
                <div class="form-floating">
                    <input type="password" class="form-control" id="password" placeholder="Password" required>
                    <label for="password"><i class="fas fa-lock me-2"></i>Password</label>
                </div>
                
                <button type="submit" class="btn btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt me-2"></i>Login to Dashboard
                </button>
                
                <!-- Loading Spinner -->
                <div class="loading-spinner" id="loadingSpinner">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2 mb-0">Authenticating...</p>
                </div>
            </form>
            
            <!-- Back to Home -->
            <div class="back-link">
                <a href="index.html">
                    <i class="fas fa-arrow-left me-1"></i>Back to Home
                </a>
            </div>
        </div>
    </div>

    <script>
        // Get the intended destination from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const destination = urlParams.get('dest') || 'product-management';
        
        // Handle form submission
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }
            
            // Show loading state
            showLoading();
            
            // Make login request
            fetch('http://localhost:8080/api/users/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(user => {
                hideLoading();
                
                // Check if user has admin or vendor role
                if (user.role === 'ADMIN' || user.role === 'VENDOR') {
                    // Store user info in sessionStorage
                    sessionStorage.setItem('currentUser', JSON.stringify(user));
                    localStorage.setItem('currentUser', JSON.stringify(user)); // Persist across sessions
                    
                    showSuccess('Login successful! Redirecting to dashboard...');
                    
                    // Redirect based on role and destination
                    setTimeout(() => {
                        if (destination === 'admin' && user.role === 'ADMIN') {
                            window.location.href = 'admin-product.html';
                        } else if (destination === 'vendor' && user.role === 'VENDOR') {
                            window.location.href = 'vendor-product.html';
                        } else if (destination === 'product-management') {
                            window.location.href = 'product-management.html';
                        } else {
                            // Default redirect based on role
                            if (user.role === 'ADMIN') {
                                window.location.href = 'admin-product.html';
                            } else {
                                window.location.href = 'vendor-product.html';
                            }
                        }
                    }, 1500);
                } else {
                    showError('Access denied. Only Admin and Vendor roles are allowed.');
                }
            })
            .catch(error => {
                hideLoading();
                console.error('Login error:', error);
                showError('Invalid email or password. Please try again.');
            });
        });
        
        function showLoading() {
            document.getElementById('loginBtn').disabled = true;
            document.getElementById('loadingSpinner').style.display = 'block';
            hideAlerts();
        }
        
        function hideLoading() {
            document.getElementById('loginBtn').disabled = false;
            document.getElementById('loadingSpinner').style.display = 'none';
        }
        
        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorAlert').style.display = 'block';
            document.getElementById('successAlert').style.display = 'none';
        }
        
        function showSuccess(message) {
            document.getElementById('successMessage').textContent = message;
            document.getElementById('successAlert').style.display = 'block';
            document.getElementById('errorAlert').style.display = 'none';
        }
        
        function hideAlerts() {
            document.getElementById('errorAlert').style.display = 'none';
            document.getElementById('successAlert').style.display = 'none';
        }
        
        // Check if user is already logged in
        window.addEventListener('load', function() {
            const currentUser = sessionStorage.getItem('currentUser') || localStorage.getItem('currentUser');
            
            if (currentUser) {
                try {
                    const user = JSON.parse(currentUser);
                    if (user.role === 'ADMIN' || user.role === 'VENDOR') {
                        // User is already logged in, redirect to appropriate page
                        showSuccess('Already logged in! Redirecting...');
                        setTimeout(() => {
                            if (destination === 'admin' && user.role === 'ADMIN') {
                                window.location.href = 'admin-product.html';
                            } else if (destination === 'vendor' && user.role === 'VENDOR') {
                                window.location.href = 'vendor-product.html';
                            } else {
                                window.location.href = 'product-management.html';
                            }
                        }, 1000);
                    }
                } catch (error) {
                    console.error('Error parsing user data:', error);
                    // Clear invalid data
                    sessionStorage.removeItem('currentUser');
                    localStorage.removeItem('currentUser');
                }
            }
        });
    </script>
</body>
</html>
