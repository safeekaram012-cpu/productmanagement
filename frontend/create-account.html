<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Product Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .create-account-container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header-section h1 {
            color: #333;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .header-section p {
            color: #666;
            margin-bottom: 0;
        }
        
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .role-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .role-option {
            position: relative;
        }
        
        .role-option input[type="radio"] {
            position: absolute;
            opacity: 0;
        }
        
        .role-option label {
            display: block;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0;
        }
        
        .role-option input[type="radio"]:checked + label {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .role-option label:hover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }
        
        .role-icon {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        
        .role-title {
            font-weight: 600;
            margin: 0;
        }
        
        .btn-create {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .btn-create:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        
        .btn-create:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #667eea;
            color: #667eea;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .alert-container {
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .role-selector {
                grid-template-columns: 1fr;
            }
            
            .create-account-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="goBack()">
        <i class="fas fa-arrow-left me-2"></i>Back to Home
    </button>
    
    <div class="create-account-container">
        <div class="header-section">
            <h1><i class="fas fa-user-plus me-3"></i>Create Account</h1>
            <p class="text-muted">Join our product management system</p>
        </div>
        
        <form id="createAccountForm">
            <!-- Name Field -->
            <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name" required placeholder="Enter your full name">
            </div>
            
            <!-- Email Field -->
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" required placeholder="Enter your email">
            </div>
            
            <!-- Password Field -->
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required placeholder="Create a strong password">
            </div>
            
            <!-- Role Selection -->
            <div class="mb-4">
                <label class="form-label">Select Your Role</label>
                <div class="role-selector">
                    <div class="role-option">
                        <input type="radio" id="roleAdmin" name="role" value="ADMIN" required>
                        <label for="roleAdmin">
                            <div class="role-icon"><i class="fas fa-user-shield"></i></div>
                            <div class="role-title">Admin</div>
                            <small>Full system access</small>
                        </label>
                    </div>
                    
                    <div class="role-option">
                        <input type="radio" id="roleVendor" name="role" value="VENDOR" required>
                        <label for="roleVendor">
                            <div class="role-icon"><i class="fas fa-store"></i></div>
                            <div class="role-title">Vendor</div>
                            <small>Sell products</small>
                        </label>
                    </div>
                    
                    <div class="role-option">
                        <input type="radio" id="roleCustomer" name="role" value="CUSTOMER" required>
                        <label for="roleCustomer">
                            <div class="role-icon"><i class="fas fa-user"></i></div>
                            <div class="role-title">Customer</div>
                            <small>Buy products</small>
                        </label>
                    </div>
                </div>
            </div>
            
            <!-- Submit Button -->
            <button type="submit" class="btn-create" id="submitBtn">
                <i class="fas fa-user-plus me-2"></i>Create Account
            </button>
        </form>
        
        <!-- Alert Container -->
        <div class="alert-container" id="alertContainer"></div>
    </div>

    <script>
        function goBack() {
            window.location.href = 'index.html';
        }
        
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alertClass = type === 'success' ? 'alert-success' : 'alert-danger';
            
            const alert = document.createElement('div');
            alert.className = `alert ${alertClass} alert-dismissible fade show`;
            alert.style.cssText = 'margin-bottom: 10px; font-weight: bold;';
            alert.innerHTML = `
                <strong>${type === 'success' ? 'Success!' : 'Error!'}</strong> ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            // Clear previous alerts
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alert);
            
            // Auto-remove after 5 seconds
            setTimeout(() => {
                if (alert.parentNode) {
                    alert.remove();
                }
            }, 5000);
        }
        
        function handleFormSubmit(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Creating Account...';
            
            // Get form values
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const role = document.querySelector('input[name="role"]:checked')?.value;
            
            // Validation
            if (!name || !email || !password || !role) {
                showAlert('Please fill in all required fields', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Create Account';
                return;
            }
            
            // Create user object
            const userData = {
                name: name,
                email: email,
                password: password,
                role: role
            };
            
            // Send API request
            fetch('http://localhost:8080/api/users/create', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(userData)
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                showAlert('Account created successfully! You can now log in.', 'success');
                document.getElementById('createAccountForm').reset();
                
                // Redirect based on role
                setTimeout(() => {
                    if (role === 'ADMIN') {
                        window.location.href = 'admin-product.html';
                    } else if (role === 'VENDOR') {
                        window.location.href = 'vendor-product.html';
                    } else {
                        window.location.href = 'products.html';
                    }
                }, 2000);
            })
            .catch(error => {
                console.error('Error creating account:', error);
                showAlert('Failed to create account: ' + error.message, 'error');
            })
            .finally(() => {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Create Account';
            });
        }
        
        // Initialize form submission
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('createAccountForm').addEventListener('submit', handleFormSubmit);
        });
    </script>
</body>
</html>
