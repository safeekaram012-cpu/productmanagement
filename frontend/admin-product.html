<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Product Upload - Product Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .upload-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header-section h1 {
            color: #333;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .header-section p {
            color: #666;
            margin-bottom: 0;
        }
        
        .form-label {
            font-weight: 600;
            color: #333;
        }
        
        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .image-upload-section {
            border: 2px dashed #667eea;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            background: rgba(102, 126, 234, 0.05);
            margin-bottom: 20px;
        }
        
        .image-preview-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .image-preview-item {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .image-preview-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }
        
        .remove-image {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(220, 53, 69, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .remove-image:hover {
            background: rgba(200, 35, 51, 1);
            transform: scale(1.1);
        }
        
        .btn-upload {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        
        .btn-upload:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #667eea;
            color: #667eea;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .alert-container {
            margin-top: 20px;
        }
        
        .admin-badge {
            background: #dc3545;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="goBack()">
        <i class="fas fa-arrow-left me-2"></i>Back to Home
    </button>
    
    <div class="upload-container">
        <div class="header-section">
            <div class="admin-badge">
                <i class="fas fa-user-shield me-2"></i>Admin Panel
            </div>
            <h1><i class="fas fa-plus-circle me-3"></i>Add Product</h1>
            <p class="text-muted">Add products to system with full admin privileges</p>
        </div>
        
        <form id="adminProductForm">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="name" class="form-label">Product Name</label>
                        <input type="text" class="form-control" id="name" required placeholder="Enter product name">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="price" class="form-label">Price ($)</label>
                        <input type="number" step="0.01" class="form-control" id="price" required placeholder="0.00">
                    </div>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="category" class="form-label">Category</label>
                        <input type="text" class="form-control" id="category" required placeholder="e.g., Electronics, Clothing">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="stock" class="form-label">Stock Quantity</label>
                        <input type="number" class="form-control" id="stock" required placeholder="0">
                    </div>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="adminId" class="form-label">Admin ID</label>
                <input type="number" class="form-control" id="adminId" required placeholder="Enter your admin ID">
                <small class="text-muted">Your administrator ID for verification</small>
            </div>
            
            <!-- Image Upload Section -->
            <div class="image-upload-section">
                <i class="fas fa-cloud-upload-alt fa-3x mb-3" style="color: #667eea;"></i>
                <h4>Upload Product Images</h4>
                <p class="text-muted">Select up to 4 images for your product</p>
                <input type="file" id="productImages" multiple accept="image/*" onchange="previewImages()">
                <small class="text-muted">Select up to 4 image files (JPG, PNG, GIF)</small>
                
                <div id="imagePreview" class="image-preview-container"></div>
            </div>
            
            <button type="submit" class="btn-upload" id="submitBtn">
                <i class="fas fa-plus-circle me-2"></i>Add Product as Admin
            </button>
        </form>
        
        <!-- Alert Container -->
        <div class="alert-container" id="alertContainer"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let selectedImages = [];
        
        function goBack() {
            window.location.href = 'index.html';
        }
        
        function previewImages() {
            const fileInput = document.getElementById('productImages');
            const previewContainer = document.getElementById('imagePreview');
            const files = Array.from(fileInput.files);
            
            // Clear previous previews
            previewContainer.innerHTML = '';
            selectedImages = [];
            
            // Limit to 4 images
            const maxImages = 4;
            const imagesToProcess = files.slice(0, maxImages);
            
            if (files.length > maxImages) {
                showAlert(`Only ${maxImages} images allowed. First ${maxImages} images will be processed.`, 'warning');
            }
            
            // Create previews
            imagesToProcess.forEach((file, index) => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    
                    reader.onload = function(e) {
                        const previewItem = createImagePreview(e.target.result, index);
                        previewContainer.appendChild(previewItem);
                        selectedImages.push(file);
                    };
                    
                    reader.readAsDataURL(file);
                } else {
                    showAlert(`File "${file.name}" is not a valid image file.`, 'error');
                }
            });
        }
        
        function createImagePreview(imageSrc, index) {
            const previewItem = document.createElement('div');
            previewItem.className = 'image-preview-item';
            previewItem.style.cssText = 'position: relative; margin-bottom: 15px; text-align: center; display: inline-block; margin: 5px;';
            
            const img = document.createElement('img');
            img.src = imageSrc;
            img.style.cssText = 'max-width: 100px; max-height: 100px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);';
            
            const removeBtn = document.createElement('button');
            removeBtn.innerHTML = '×';
            removeBtn.style.cssText = 'position: absolute; top: -10px; right: -10px; background: rgba(220, 53, 69, 0.9); color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px;';
            removeBtn.onclick = () => removeImage(index);
            
            previewItem.appendChild(img);
            previewItem.appendChild(removeBtn);
            
            return previewItem;
        }
        
        function removeImage(index) {
            const fileInput = document.getElementById('productImages');
            const previewContainer = document.getElementById('imagePreview');
            
            // Remove from selected images
            selectedImages = selectedImages.filter((_, i) => i !== index);
            
            // Rebuild file input
            const dataTransfer = new DataTransfer();
            selectedImages.forEach(file => dataTransfer.items.add(file));
            fileInput.files = dataTransfer.files;
            
            // Rebuild preview
            previewContainer.innerHTML = '';
            selectedImages.forEach((file, i) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const previewItem = createImagePreview(e.target.result, i);
                    previewContainer.appendChild(previewItem);
                };
                reader.readAsDataURL(file);
            });
        }
        
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alertClass = type === 'success' ? 'alert-success' : 'alert-danger';
            
            const alert = document.createElement('div');
            alert.className = `alert ${alertClass} alert-dismissible fade show`;
            alert.style.cssText = 'margin-bottom: 10px; font-weight: bold;';
            alert.innerHTML = `
                <strong>${type === 'success' ? 'Success!' : 'Error!'}</strong> ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            // Clear previous alerts
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alert);
            
            // Auto-remove after 5 seconds
            setTimeout(() => {
                if (alert.parentNode) {
                    alert.remove();
                }
            }, 5000);
        }
        
        function handleFormSubmit(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Adding Product...';
            
            try {
                // Validate form
                const name = document.getElementById('name').value.trim();
                const price = document.getElementById('price').value;
                const category = document.getElementById('category').value.trim();
                const stock = document.getElementById('stock').value;
                const adminId = document.getElementById('adminId').value;
                
                if (!name || !price || !category || !stock || !adminId) {
                    showAlert('Please fill in all required fields', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-plus-circle me-2"></i>Add Product as Admin';
                    return;
                }
                
                // Create FormData for file upload
                const formData = new FormData();
                
                // Add form fields
                formData.append('name', name);
                formData.append('price', price);
                formData.append('category', category);
                formData.append('stock', stock);
                formData.append('adminId', adminId);
                
                // Add images
                selectedImages.forEach(file => {
                    formData.append('images', file);
                });
                
                // Make API call
                fetch('http://localhost:8080/api/products/admin/add', {
                    method: 'POST',
                    body: formData
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    showAlert('Product added successfully!', 'success');
                    document.getElementById('adminProductForm').reset();
                    document.getElementById('imagePreview').innerHTML = '';
                    selectedImages = [];
                })
                .catch(error => {
                    console.error('Error adding product:', error);
                    showAlert('Error adding product: ' + error.message, 'error');
                })
                .finally(() => {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-plus-circle me-2"></i>Add Product as Admin';
                });
                
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-plus-circle me-2"></i>Add Product as Admin';
            }
        }
        
        // Initialize form submission
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('adminProductForm').addEventListener('submit', handleFormSubmit);
        });
    </script>
</body>
</html>
