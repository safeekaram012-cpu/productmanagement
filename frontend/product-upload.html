<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Upload - Product Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .upload-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .upload-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .upload-header h1 {
            color: #333;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .user-type-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .user-type-tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.3s ease;
        }
        
        .user-type-tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }
        
        .form-section {
            display: none;
        }
        
        .form-section.active {
            display: block;
        }
        
        .image-upload-section {
            border: 2px dashed #667eea;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            background: rgba(102, 126, 234, 0.05);
            margin-bottom: 20px;
        }
        
        .image-preview-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .image-preview-item {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .image-preview-item img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }
        
        .remove-image {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(220, 53, 69, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .remove-image:hover {
            background: rgba(200, 35, 51, 1);
            transform: scale(1.1);
        }
        
        .btn-upload {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #667eea;
            color: #667eea;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="goBack()">
        <i class="fas fa-arrow-left me-2"></i>Back to Home
    </button>
    
    <div class="upload-container">
        <div class="upload-header">
            <h1><i class="fas fa-box-open me-3"></i>Product Upload</h1>
            <p class="text-muted">Add products with images - Simple & Direct</p>
        </div>
        
        <!-- User Type Tabs -->
        <div class="user-type-tabs">
            <button class="user-type-tab active" onclick="switchUserType('admin')">
                <i class="fas fa-user-shield me-2"></i>Admin
            </button>
            <button class="user-type-tab" onclick="switchUserType('vendor')">
                <i class="fas fa-store me-2"></i>Vendor
            </button>
        </div>
        
        <!-- Admin Form Section -->
        <div id="admin-section" class="form-section active">
            <form id="admin-form">
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="admin-name" class="form-label">Product Name</label>
                            <input type="text" class="form-control" id="admin-name" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="admin-price" class="form-label">Price ($)</label>
                            <input type="number" step="0.01" class="form-control" id="admin-price" required>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="admin-category" class="form-label">Category</label>
                            <input type="text" class="form-control" id="admin-category" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="admin-stock" class="form-label">Stock Quantity</label>
                            <input type="number" class="form-control" id="admin-stock" required>
                        </div>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="admin-id" class="form-label">Admin ID</label>
                    <input type="number" class="form-control" id="admin-id" required>
                </div>
                
                <!-- Image Upload Section -->
                <div class="image-upload-section">
                    <i class="fas fa-cloud-upload-alt fa-3x mb-3" style="color: #667eea;"></i>
                    <h4>Upload Product Images</h4>
                    <p class="text-muted">Select up to 4 images for your product</p>
                    <input type="file" id="admin-images" multiple accept="image/*" onchange="previewImages('admin')">
                    <small class="text-muted">Select up to 4 image files</small>
                    
                    <div id="admin-preview" class="image-preview-container"></div>
                </div>
                
                <button type="submit" class="btn-upload">
                    <i class="fas fa-plus-circle me-2"></i>Add Product as Admin
                </button>
            </form>
        </div>
        
        <!-- Vendor Form Section -->
        <div id="vendor-section" class="form-section">
            <form id="vendor-form">
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="vendor-name" class="form-label">Product Name</label>
                            <input type="text" class="form-control" id="vendor-name" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="vendor-price" class="form-label">Price ($)</label>
                            <input type="number" step="0.01" class="form-control" id="vendor-price" required>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="vendor-category" class="form-label">Category</label>
                            <input type="text" class="form-control" id="vendor-category" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="vendor-stock" class="form-label">Stock Quantity</label>
                            <input type="number" class="form-control" id="vendor-stock" required>
                        </div>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="vendor-id" class="form-label">Vendor ID</label>
                    <input type="number" class="form-control" id="vendor-id" required>
                </div>
                
                <!-- Image Upload Section -->
                <div class="image-upload-section">
                    <i class="fas fa-cloud-upload-alt fa-3x mb-3" style="color: #667eea;"></i>
                    <h4>Upload Product Images</h4>
                    <p class="text-muted">Select up to 4 images for your product</p>
                    <input type="file" id="vendor-images" multiple accept="image/*" onchange="previewImages('vendor')">
                    <small class="text-muted">Select up to 4 image files</small>
                    
                    <div id="vendor-preview" class="image-preview-container"></div>
                </div>
                
                <button type="submit" class="btn-upload">
                    <i class="fas fa-plus-circle me-2"></i>Add Product as Vendor
                </button>
            </form>
        </div>
        
        <!-- Alert Container -->
        <div class="alert-container mt-3" id="alert-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let selectedImages = {
            admin: [],
            vendor: []
        };

        function switchUserType(type) {
            // Update tabs
            document.querySelectorAll('.user-type-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Update forms
            document.querySelectorAll('.form-section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(`${type}-section`).classList.add('active');
        }

        function previewImages(type) {
            const fileInput = document.getElementById(`${type}-images`);
            const previewContainer = document.getElementById(`${type}-preview`);
            const files = Array.from(fileInput.files);
            
            // Clear previous previews
            previewContainer.innerHTML = '';
            selectedImages[type] = [];
            
            // Limit to 4 images
            const maxImages = 4;
            const imagesToProcess = files.slice(0, maxImages);
            
            if (files.length > maxImages) {
                showAlert(`Only ${maxImages} images allowed. First ${maxImages} images will be processed.`, 'warning');
            }
            
            // Create previews
            imagesToProcess.forEach((file, index) => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    
                    reader.onload = function(e) {
                        const previewItem = createImagePreview(e.target.result, index, type);
                        previewContainer.appendChild(previewItem);
                        selectedImages[type].push(file);
                    };
                    
                    reader.readAsDataURL(file);
                } else {
                    showAlert(`File "${file.name}" is not a valid image file.`, 'error');
                }
            });
        }

        function createImagePreview(imageSrc, index, type) {
            const previewItem = document.createElement('div');
            previewItem.className = 'image-preview-item';
            
            const img = document.createElement('img');
            img.src = imageSrc;
            
            const removeBtn = document.createElement('button');
            removeBtn.innerHTML = '×';
            removeBtn.className = 'remove-image';
            removeBtn.onclick = () => removeImage(type, index);
            
            previewItem.appendChild(img);
            previewItem.appendChild(removeBtn);
            
            return previewItem;
        }

        function removeImage(type, index) {
            const fileInput = document.getElementById(`${type}-images`);
            const previewContainer = document.getElementById(`${type}-preview`);
            
            // Remove from selected images
            selectedImages[type] = selectedImages[type].filter((_, i) => i !== index);
            
            // Rebuild file input
            const dataTransfer = new DataTransfer();
            selectedImages[type].forEach(file => dataTransfer.items.add(file));
            fileInput.files = dataTransfer.files;
            
            // Rebuild preview
            previewContainer.innerHTML = '';
            selectedImages[type].forEach((file, i) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const previewItem = createImagePreview(e.target.result, i, type);
                    previewContainer.appendChild(previewItem);
                };
                reader.readAsDataURL(file);
            });
        }

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alert-container');
            const alertClass = type === 'success' ? 'alert-success' : 'alert-danger';
            
            const alert = document.createElement('div');
            alert.className = `alert ${alertClass} alert-dismissible fade show`;
            alert.innerHTML = `
                <strong>${type === 'success' ? 'Success!' : 'Error!'}</strong> ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alert);
            
            setTimeout(() => {
                if (alert.parentNode) {
                    alert.remove();
                }
            }, 5000);
        }

        function handleAdminSubmit(event) {
            event.preventDefault();
            
            const formData = new FormData();
            formData.append('name', document.getElementById('admin-name').value);
            formData.append('price', document.getElementById('admin-price').value);
            formData.append('category', document.getElementById('admin-category').value);
            formData.append('stock', document.getElementById('admin-stock').value);
            formData.append('adminId', document.getElementById('admin-id').value);
            
            // Add images
            selectedImages.admin.forEach(file => {
                formData.append('images', file);
            });
            
            fetch('http://localhost:8080/api/products/admin/add', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                showAlert('Product added successfully!', 'success');
                document.getElementById('admin-form').reset();
                document.getElementById('admin-preview').innerHTML = '';
                selectedImages.admin = [];
            })
            .catch(error => {
                showAlert('Error adding product: ' + error.message, 'error');
            });
        }

        function handleVendorSubmit(event) {
            event.preventDefault();
            
            const formData = new FormData();
            formData.append('name', document.getElementById('vendor-name').value);
            formData.append('price', document.getElementById('vendor-price').value);
            formData.append('category', document.getElementById('vendor-category').value);
            formData.append('stock', document.getElementById('vendor-stock').value);
            formData.append('vendorId', document.getElementById('vendor-id').value);
            
            // Add images
            selectedImages.vendor.forEach(file => {
                formData.append('images', file);
            });
            
            fetch('http://localhost:8080/api/products/vendor/add', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                showAlert('Product added successfully!', 'success');
                document.getElementById('vendor-form').reset();
                document.getElementById('vendor-preview').innerHTML = '';
                selectedImages.vendor = [];
            })
            .catch(error => {
                showAlert('Error adding product: ' + error.message, 'error');
            });
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        // Initialize event listeners
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('admin-form').addEventListener('submit', handleAdminSubmit);
            document.getElementById('vendor-form').addEventListener('submit', handleVendorSubmit);
        });
    </script>
</body>
</html>
