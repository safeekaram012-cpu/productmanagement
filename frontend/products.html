<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products - Product Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .products-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header-section {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .search-section {
            margin-bottom: 30px;
        }
        
        .search-container {
            position: relative;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .search-input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        
        .search-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.6);
            background: white;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }
        
        .search-input::placeholder {
            color: #999;
        }
        
        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 1.2rem;
            pointer-events: none;
        }
        
        .no-results {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            margin: 50px 0;
            display: none;
        }
        
        .back-btn {
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #667eea;
            color: #667eea;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .back-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .product-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        
        .product-images {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
            height: 200px;
        }
        
        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6c757d;
            font-size: 2rem;
        }
        
        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }
        
        .product-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        
        .product-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .product-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: #28a745;
        }
        
        .product-category {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        .product-stock {
            color: #6c757d;
            font-size: 0.9rem;
        }
        
        .loading-spinner {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            margin: 50px 0;
        }
        
        .error-message {
            background: rgba(220, 53, 69, 0.9);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin: 20px 0;
        }
        
        .no-products {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            margin: 50px 0;
        }
        
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
            
            .header-section h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="products-container">
        <!-- Header Section -->
        <div class="header-section">
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left me-2"></i>Back to Home
            </button>
            <h1><i class="fas fa-shopping-cart me-3"></i>All Products</h1>
            <p class="lead">Browse our complete product catalog</p>
        </div>
        
        <!-- Search Section -->
        <div class="search-section">
            <div class="search-container">
                <input type="text" 
                       class="search-input" 
                       id="searchInput" 
                       placeholder="Search products by name..."
                       onkeyup="filterProducts()">
                <i class="fas fa-search search-icon"></i>
            </div>
        </div>
        
        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i> Loading products...
        </div>
        
        <!-- Error Message -->
        <div id="errorMessage" class="error-message" style="display: none;">
            <i class="fas fa-exclamation-triangle me-2"></i>
            <span id="errorText">Failed to load products. Please try again later.</span>
        </div>
        
        <!-- No Products Message -->
        <div id="noProducts" class="no-products" style="display: none;">
            <i class="fas fa-box-open fa-3x mb-3"></i>
            <p>No products found in the system.</p>
        </div>
        
        <!-- No Search Results Message -->
        <div id="noSearchResults" class="no-results">
            <i class="fas fa-search fa-3x mb-3"></i>
            <p>No products found matching your search.</p>
            <p class="text-muted">Try searching with different keywords</p>
        </div>
        
        <!-- Products Grid -->
        <div id="productsGrid" class="products-grid" style="display: none;">
            <!-- Products will be dynamically added here -->
        </div>
    </div>

    <script>
        let allProducts = [];
        
        // Load products when page loads
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
        });
        
        function loadProducts() {
            showLoading();
            
            fetch('http://localhost:8080/api/products/all')
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    allProducts = data;
                    displayProducts(data);
                })
                .catch(error => {
                    console.error('Error loading products:', error);
                    showError('Failed to load products: ' + error.message);
                });
        }
        
        function displayProducts(products) {
            hideLoading();
            
            if (!products || products.length === 0) {
                showNoProducts();
                return;
            }
            
            const productsGrid = document.getElementById('productsGrid');
            const noSearchResults = document.getElementById('noSearchResults');
            
            productsGrid.innerHTML = '';
            
            products.forEach(product => {
                const productCard = createProductCard(product);
                productsGrid.appendChild(productCard);
            });
            
            productsGrid.style.display = 'grid';
            noSearchResults.style.display = 'none';
        }
        
        function createProductCard(product) {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.style.cursor = 'pointer';
            card.onclick = () => goToProductDetail(product);
            
            // Create image grid
            const imagesGrid = createImagesGrid(product);
            
            // Product details
            const details = `
                <h3 class="product-name">${product.name || 'Unknown Product'}</h3>
                <div class="product-details">
                    <span class="product-price">$${product.price || '0.00'}</span>
                    <span class="product-category">${product.category || 'Uncategorized'}</span>
                </div>
                <div class="product-stock">
                    <i class="fas fa-box me-1"></i>
                    Stock: ${product.stock || 0} units
                </div>
            `;
            
            card.innerHTML = imagesGrid + details;
            return card;
        }
        
        function createImagesGrid(product) {
            const images = [];
            
            // Collect all available images
            if (product.image1) images.push(product.image1);
            if (product.image2) images.push(product.image2);
            if (product.image3) images.push(product.image3);
            if (product.image4) images.push(product.image4);
            
            let imagesHtml = '<div class="product-images">';
            
            // Create up to 4 image slots
            for (let i = 0; i < 4; i++) {
                if (images[i]) {
                    // If image is a base64 string (starts with data:)
                    if (images[i].startsWith('data:')) {
                        imagesHtml += `<div class="product-image"><img src="${images[i]}" alt="Product image ${i + 1}"></div>`;
                    } else {
                        // If image is a filename, construct URL
                        imagesHtml += `<div class="product-image"><img src="http://localhost:8080/uploads/${images[i]}" alt="Product image ${i + 1}" onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\\'fas fa-image\\'></i>'"></div>`;
                    }
                } else {
                    // Empty slot
                    imagesHtml += '<div class="product-image"><i class="fas fa-image"></i></div>';
                }
            }
            
            imagesHtml += '</div>';
            return imagesHtml;
        }
        
        function showLoading() {
            document.getElementById('loadingSpinner').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('noProducts').style.display = 'none';
            document.getElementById('productsGrid').style.display = 'none';
        }
        
        function hideLoading() {
            document.getElementById('loadingSpinner').style.display = 'none';
        }
        
        function showError(message) {
            hideLoading();
            document.getElementById('errorText').textContent = message;
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('noProducts').style.display = 'none';
            document.getElementById('productsGrid').style.display = 'none';
        }
        
        function showNoProducts() {
            hideLoading();
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('noProducts').style.display = 'block';
            document.getElementById('productsGrid').style.display = 'none';
        }
        
        function goBack() {
            window.location.href = 'index.html';
        }
        
        function goToProductDetail(product) {
            // Store product data in sessionStorage for the detail page
            sessionStorage.setItem('selectedProduct', JSON.stringify(product));
            window.location.href = 'product-detail.html';
        }
        
        function filterProducts() {
            const searchInput = document.getElementById('searchInput');
            const searchTerm = searchInput.value.toLowerCase().trim();
            const productsGrid = document.getElementById('productsGrid');
            const noSearchResults = document.getElementById('noSearchResults');
            
            // If search term is empty, show all products
            if (searchTerm === '') {
                displayProducts(allProducts);
                return;
            }
            
            // Filter products based on search term
            const filteredProducts = allProducts.filter(product => {
                const productName = (product.name || '').toLowerCase();
                return productName.includes(searchTerm);
            });
            
            // Display filtered results
            if (filteredProducts.length > 0) {
                displayProducts(filteredProducts);
                noSearchResults.style.display = 'none';
            } else {
                // Hide products grid and show no results message
                productsGrid.style.display = 'none';
                noSearchResults.style.display = 'block';
            }
        }
    </script>
</body>
</html>
